<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      width: 300px;
      background: #f0f2ff;
      color: #1a1a2e;
    }
    .header {
      background: linear-gradient(135deg, #5b5fe8 0%, #7c4dff 100%);
      color: white;
      padding: 14px 16px;
    }
    .header-top { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .header-logo { font-size: 20px; }
    .header-title { font-size: 15px; font-weight: 700; flex: 1; }
    .status-dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: #f59e0b;
    }
    .status-dot.connected { background: #10b981; }
    .status-dot.error     { background: #ef4444; }

    /* ── Login screen ── */
    #loginScreen {
      padding: 32px 24px;
      text-align: center;
      background: white;
    }
    #loginScreen .login-icon { font-size: 48px; margin-bottom: 12px; }
    #loginScreen h2 { font-size: 16px; font-weight: 700; color: #1a1a2e; margin-bottom: 6px; }
    #loginScreen p { font-size: 12px; color: #6b7280; margin-bottom: 20px; line-height: 1.5; }
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 10px 16px;
      background: white;
      color: #374151;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      font-family: inherit;
    }
    .btn-google:hover { background: #f9fafb; }
    .btn-google:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-google svg { width: 16px; height: 16px; flex-shrink: 0; }
    .login-error { font-size: 11px; color: #ef4444; margin-top: 10px; }

    /* ── User info bar ── */
    #userBar {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 7px 14px;
      background: rgba(255,255,255,0.15);
      font-size: 11px;
      color: rgba(255,255,255,0.9);
    }
    #userBar.visible { display: flex; }
    #userAvatar {
      width: 20px; height: 20px; border-radius: 50%;
      object-fit: cover; flex-shrink: 0;
    }
    #userAvatarFallback {
      width: 20px; height: 20px; border-radius: 50%;
      background: rgba(255,255,255,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; flex-shrink: 0;
    }
    #userName { flex: 1; }
    #btnSignOut {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 10px;
      cursor: pointer;
      font-family: inherit;
    }
    #btnSignOut:hover { background: rgba(255,255,255,0.35); }

    /* ── Main content ── */
    #mainContent { display: none; }
    #mainContent.visible { display: block; }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 12px 14px;
      background: white;
      border-bottom: 1px solid #e8eaff;
    }
    .stat { text-align: center; }
    .stat-num { font-size: 22px; font-weight: 700; color: #5b5fe8; }
    .stat-label { font-size: 10px; color: #9ca3af; text-transform: uppercase; }
    .resume-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: white;
      border-bottom: 1px solid #e8eaff;
      font-size: 12px;
    }
    .resume-badge {
      background: #e8eaff;
      color: #5b5fe8;
      border-radius: 10px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 500;
    }
    .section-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #9ca3af;
      padding: 10px 14px 4px;
    }
    .app-list { padding: 0 8px 8px; }
    .app-item {
      background: white;
      border-radius: 8px;
      padding: 10px 11px;
      margin-bottom: 5px;
      border: 1px solid #e8eaff;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .app-item:hover { border-color: #5b5fe8; }
    .app-company { font-size: 13px; font-weight: 600; color: #1a1a2e; }
    .app-role    { font-size: 11px; color: #6b7280; margin-top: 2px; }
    .app-date    { font-size: 10px; color: #9ca3af; }
    .status-pill {
      font-size: 10px;
      font-weight: 600;
      border-radius: 8px;
      padding: 2px 7px;
      white-space: nowrap;
    }
    .status-Applied    { background: #e8eaff; color: #5b5fe8; }
    .status-Interview  { background: #d1fae5; color: #059669; }
    .status-Offer      { background: #fef9c3; color: #ca8a04; }
    .status-Rejected   { background: #fee2e2; color: #dc2626; }
    .status-Screening  { background: #fce7f3; color: #be185d; }
    .status-Ghosted    { background: #f3f4f6; color: #9ca3af; }
    .footer {
      padding: 10px 14px;
      border-top: 1px solid #e8eaff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: white;
    }
    .footer a {
      color: #5b5fe8;
      text-decoration: none;
      font-size: 12px;
      font-weight: 500;
    }
    .footer a:hover { text-decoration: underline; }
    .empty {
      text-align: center;
      padding: 16px;
      color: #9ca3af;
      font-size: 12px;
    }

    /* ── Report modal ── */
    #reportOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #reportOverlay.visible { display: flex; }
    #reportModal {
      background: white;
      border-radius: 10px;
      padding: 18px;
      width: 260px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    }
    #reportModal h3 { font-size: 14px; font-weight: 700; margin-bottom: 10px; color: #1a1a2e; }
    #reportModal textarea {
      width: 100%;
      height: 80px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 7px 9px;
      font-size: 12px;
      font-family: inherit;
      resize: none;
      outline: none;
    }
    #reportModal textarea:focus { border-color: #5b5fe8; }
    #reportModal input[type="email"] {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 6px 9px;
      font-size: 12px;
      font-family: inherit;
      margin-top: 7px;
      outline: none;
    }
    #reportModal input[type="email"]:focus { border-color: #5b5fe8; }
    .report-actions { display: flex; gap: 8px; margin-top: 10px; }
    .btn-submit-report {
      flex: 1;
      padding: 7px;
      background: #5b5fe8;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-submit-report:hover { background: #4a4fd4; }
    .btn-submit-report:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-cancel-report {
      padding: 7px 12px;
      background: #f3f4f6;
      color: #374151;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-cancel-report:hover { background: #e5e7eb; }
    #reportStatus { font-size: 11px; margin-top: 6px; color: #059669; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-top">
      <span class="header-logo">🤖</span>
      <span class="header-title">Job Assistant</span>
      <span class="status-dot" id="statusDot"></span>
    </div>
    <div id="userBar">
      <img id="userAvatar" src="" alt="" style="display:none" />
      <div id="userAvatarFallback"></div>
      <span id="userName"></span>
      <button id="btnSignOut">Sign out</button>
    </div>
  </div>

  <!-- Login screen (shown when not authenticated) -->
  <div id="loginScreen">
    <div class="login-icon">🔐</div>
    <h2>Sign in to continue</h2>
    <p>Sign in with your Google account to access your job applications and AI tools.</p>
    <button class="btn-google" id="btnSignIn">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Sign in with Google
    </button>
    <div class="login-error" id="loginError"></div>
  </div>

  <!-- Main content (shown when authenticated) -->
  <div id="mainContent">
    <div class="stats">
      <div class="stat">
        <div class="stat-num" id="statTotal">—</div>
        <div class="stat-label">Applied</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="statInterview">—</div>
        <div class="stat-label">Interview</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="statOffer">—</div>
        <div class="stat-label">Offer</div>
      </div>
    </div>

    <div class="resume-row">
      <span>Active resume:</span>
      <span class="resume-badge" id="resumeBadge">None</span>
    </div>

    <div class="section-title">Recent Applications</div>
    <div class="app-list" id="appList">
      <div class="empty">Loading...</div>
    </div>

    <div class="footer">
      <a href="#" id="settingsLink">⚙ Settings</a>
      <span id="statusText" style="font-size:11px; color:#9ca3af;"></span>
      <a href="#" id="reportLink">Report Issue</a>
    </div>
  </div>

  <!-- Report issue modal -->
  <div id="reportOverlay">
    <div id="reportModal">
      <h3>Report an Issue</h3>
      <textarea id="reportMessage" placeholder="Describe what went wrong…"></textarea>
      <input type="email" id="reportEmail" placeholder="Your email (optional, for follow-up)" />
      <div class="report-actions">
        <button class="btn-submit-report" id="btnSubmitReport">Send Report</button>
        <button class="btn-cancel-report" id="btnCancelReport">Cancel</button>
      </div>
      <div id="reportStatus"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
